<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-Invest | Home</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="icon" href="data:,">
    <style>
        /* Hero section specific styles */
        .hero-section {
            min-height: calc(100vh - 64px);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }

        .hero-content h1 {
            font-size: clamp(3rem, 5vw, 5rem);
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #ffffff, #ffa502);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-content p {
            font-size: 1.2rem;
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto 2rem;
            line-height: 1.6;
        }

        .cta-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.8rem 2rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-primary {
            background: var(--accent);
            color: #020c1b;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255, 165, 2, 0.3);
        }

        .btn-secondary {
            border: 2px solid var(--border);
            color: var(--text);
        }

        .btn-secondary:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
    </style>
</head>

<body class="home-page">
    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-left">
            <div class="logo-mark">X</div>
            <div class="logo-text"><span>Invest</span></div>
        </div>
        <div class="nav-links">
            <a href="/" class="active">Home</a>
            <a href="/chat">Chat</a>
            <a href="/market">Markets</a>
            <a href="/backtest">Backtest</a>
            <span class="pill"><span class="pill-dot"></span> Login (soon)</span>
        </div>
    </nav>

    <!-- Hero Content -->
    <main class="hero-section">
        <div class="hero-content">
            <h1>Smart Financial Intelligence</h1>
            <p>
                Analyze markets, chat with an AI financial assistant, and backtest your trading strategies with
                institutional-grade metrics.
            </p>
            <div class="cta-buttons">
                <a href="/chat" class="btn btn-primary">🚀 Start Chatting</a>
                <a href="/market" class="btn btn-secondary">📊 View Markets</a>
                <a href="/backtest" class="btn btn-secondary">⚡ Run Backtest</a>
            </div>
        </div>
    </main>
</body>

</html>
